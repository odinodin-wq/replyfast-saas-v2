<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI SaaS</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
.chat{height:80vh;overflow:auto;padding:10px;}
.msg{margin:5px;padding:10px;border-radius:8px;}
.user{background:#ff2d2d;text-align:right;}
.ai{background:#1c1c1c;}
.bottom{position:fixed;bottom:0;width:100%;display:flex;}
input{flex:1;padding:12px;border:none;}
button{padding:12px;background:#ff2d2d;color:#fff;border:none;}
</style>

</head>
<body>

<div class="chat" id="chat"></div>

<div class="bottom">
<input id="msg">
<button onclick="send()">Send</button>
</div>

<script>

const userId = localStorage.getItem("userId");

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
}

async function send(){
  const text = msg.value;

  add("You: " + text, "user");

  const res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      message:text,
      userId
    })
  });

  const data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}

</script>

</body>
</html>
