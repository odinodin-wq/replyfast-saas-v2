<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFast SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
}

/* LOGIN */
#auth {
  max-width:400px;
  margin:80px auto;
  padding:20px;
  background:#111;
  border-radius:12px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#ff2d2d;
  color:white;
  cursor:pointer;
}

/* APP */
#app {
  display:none;
  padding:20px;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
  border-radius:10px;
}

.online {
  color:#aaa;
  font-size:14px;
}

.dot {
  width:10px;
  height:10px;
  background:#00ff88;
  border-radius:50%;
  display:inline-block;
  margin-right:5px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.5);}
  100% {transform:scale(1);}
}

/* CHAT */
.chat {
  margin-top:20px;
  background:#111;
  border-radius:10px;
  padding:10px;
  height:400px;
  overflow:auto;
}

.msg {
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.user {background:#ff2d2d;}
.ai {background:#222;}

.inputBox {
  display:flex;
  margin-top:10px;
}

.inputBox input {
  flex:1;
}

.inputBox button {
  width:120px;
  margin-left:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>ReplyFast Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <div>🔥 ReplyFast SaaS</div>
    <div class="online"><span class="dot"></span>AI online</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Напиши клиентский вопрос...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
/* =========================
   🔑 SUPABASE CONFIG
   ========================= */

// ✔ URL У ТЕБЯ ПРАВИЛЬНЫЙ:
const SUPABASE_URL = "https://cowsflyfghivkafjauzm.supabase.co";

// ❗ ВСТАВЬ СЮДА СВОЙ ANON KEY (из Supabase → API)
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvd3NmbHlmZ2hpdmthZmphdXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzY1NjAsImV4cCI6MjA5MjUxMjU2MH0.Z3YWipoU_0ZX2XNWTvp-v0TdMgQ0s6V_r90SHD7Ukx8";

const supabase = supabase_js.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let user = null;

/* =========================
   🔐 AUTH
   ========================= */

async function signUp(){
  let { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  status.innerText = error ? error.message : "Check email 📩";
}

async function signIn(){
  let { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    status.innerText = error.message;
  } else {
    user = data.user;
    startApp();
  }
}

function startApp(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* =========================
   💬 CHAT
   ========================= */

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:text,
      userId:user.id
    })
  });

  let data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}
</script>

</body>
</html>
