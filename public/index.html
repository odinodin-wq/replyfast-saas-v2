<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFast AI</title>

<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background:#000;
  color:white;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
  background: radial-gradient(circle at top, #1a0000, #000);
}

.hero h1 {
  font-size:42px;
  color:#ff2d2d;
}

.hero p {
  color:#aaa;
  font-size:18px;
}

.hero button {
  margin-top:20px;
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff2d2d,#ff6b6b);
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* SECTION */
.section {
  padding:60px 20px;
  text-align:center;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#111;
  padding:20px;
  border-radius:12px;
  width:250px;
}

/* DEMO */
.demo {
  max-width:600px;
  margin:auto;
}

.chat {
  background:#111;
  border-radius:12px;
  padding:15px;
  height:300px;
  overflow:auto;
}

.msg {
  margin:6px 0;
  padding:10px;
  border-radius:10px;
}

.user { background:#ff2d2d; }
.ai { background:#222; }

.inputBox {
  display:flex;
  margin-top:10px;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button.send {
  margin-left:8px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2d2d;
  color:white;
}

/* PRICING */
.pricing {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.plan {
  background:#111;
  padding:25px;
  border-radius:12px;
  width:250px;
}

.plan h3 {
  color:#ff2d2d;
}

.plan button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#ff2d2d;
  border:none;
  border-radius:10px;
  color:white;
}

/* MOBILE */
@media (max-width:768px){
  .hero h1 { font-size:28px; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>AI отвечает клиентам за тебя</h1>
  <p>Автоответы для Instagram продавцов 24/7</p>
  <button onclick="scrollToDemo()">Попробовать</button>
</div>

<!-- FEATURES -->
<div class="section">
  <h2>Что умеет</h2>
  <div class="cards">
    <div class="card">Отвечает на вопросы клиентов</div>
    <div class="card">Работает 24/7</div>
    <div class="card">Увеличивает продажи</div>
  </div>
</div>

<!-- DEMO -->
<div class="section demo" id="demo">
  <h2>Попробуй прямо сейчас</h2>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Например: есть в наличии?">
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

<!-- PRICING -->
<div class="section">
  <h2>Тарифы</h2>

  <div class="pricing">
    <div class="plan">
      <h3>Free</h3>
      <p>10 сообщений</p>
      <button>Начать</button>
    </div>

    <div class="plan">
      <h3>PRO</h3>
      <p>Без лимита</p>
      <button onclick="buy()">Купить</button>
    </div>
  </div>
</div>

<script>
function scrollToDemo() {
  document.getElementById("demo").scrollIntoView({behavior:"smooth"});
}

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}

function buy(){
  alert("Подключи Stripe позже 💳");
}
</script>

</body>
</html>
