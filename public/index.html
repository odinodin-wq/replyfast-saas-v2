<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFast SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0000, #000);
  color:white;
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar {
  width:260px;
  background: rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

.logo {
  color:#ff3b3b;
  font-size:18px;
  font-weight:bold;
}

.userBox {
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

/* main */
.main {
  flex:1;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  height:85vh;
  display:flex;
  flex-direction:column;
}

.chat {
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg {
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.user { background:#ff2d2d; margin-left:auto; }
.ai { background:#222; }

.inputBox {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

button {
  margin-left:8px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2d2d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">ReplyFast AI</div>

  <div class="userBox" id="userBox">Not logged in</div>

  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <div class="card">

    <div class="chat" id="chat"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Напиши сообщение...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
const supabase = supabase.createClient(
  "https://cowsflyfghivkajfauzm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvd3NmbHlmZ2hpdmthZmphdXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzY1NjAsImV4cCI6MjA5MjUxMjU2MH0.Z3YWipoU_0ZX2XNWTvp-v0TdMgQ0s6V_r90SHD7Ukx8"
);

// LOGIN
async function login() {
  let email = prompt("Введите email");

  const { error } = await supabase.auth.signInWithOtp({ email });

  alert("Проверь почту 📩");
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  userBox.innerText = "Not logged in";
}

// CHECK USER
async function checkUser() {
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    userBox.innerText = "Logged in: " + data.user.email;
  }
}

checkUser();

// CHAT
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}
</script>

</body>
</html>
