<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sales SaaS</title>

<style>
body {font-family:Arial;background:#0b0b0b;color:#fff;margin:0;padding:0;}
.container {max-width:600px;margin:auto;padding:20px;}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;}
input{background:#222;color:#fff;}
button{background:#ff2d2d;color:#fff;cursor:pointer;}
.chat{height:300px;overflow:auto;background:#111;padding:10px;border-radius:10px;margin-top:10px;}
.msg{padding:8px;margin:5px 0;border-radius:6px;}
.user{background:#ff2d2d;}
.ai{background:#222;}
.top{display:flex;justify-content:space-between;align-items:center;}
.online{color:#00ff88;}
.pay{margin-top:15px;background:#222;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <h2>AI Sales Assistant</h2>
    <div class="online">● online</div>
  </div>

  <div class="chat" id="chat"></div>

  <input id="msg" placeholder="Напиши клиентский запрос">
  <button onclick="send()">Send</button>

  <div class="pay">
    <h3>PRO версия</h3>
    <p>Без лимита + AI продавец</p>

    <button onclick="buy()">💰 Upgrade PRO</button>
  </div>

</div>

<script>

const userId = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", userId);

function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  const res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      message:text,
      userId
    })
  });

  const data = await res.json();
  add("AI: " + data.reply, "ai");

  msg.value = "";
}

function buy(){
  window.location.href = "https://checkout.stripe.com/pay/YOUR_LINK";
}

</script>

</body>
</html>
