<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFast AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0000, #000);
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background: rgba(255,255,255,0.03);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

.logo {
  font-size:20px;
  font-weight:bold;
  color:#ff3b3b;
}

.online {
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

.dot {
  width:8px;
  height:8px;
  background:lime;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  box-shadow:0 0 10px lime;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  width:100%;
  max-width:900px;
  height:85vh;
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header {
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-weight:bold;
}

/* CHAT */
.chat {
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
  word-wrap:break-word;
}

.user {
  background:#ff2d2d;
  margin-left:auto;
}

.ai {
  background:#222;
}

/* INPUT */
.inputBox {
  display:flex;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.08);
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-size:16px;
}

button {
  margin-left:8px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff2d2d,#ff6b6b);
  color:white;
  cursor:pointer;
}

/* 📟 TABLET */
@media (max-width: 1024px) {
  .sidebar {
    width:200px;
  }

  .card {
    height:90vh;
  }
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  body {
    flex-direction:column;
  }

  .sidebar {
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
  }

  .main {
    padding:10px;
    align-items:stretch;
  }

  .card {
    height:calc(100vh - 70px);
    border-radius:12px;
  }

  .msg {
    max-width:90%;
  }

  input {
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">ReplyFast AI</div>
  <div class="online"><span class="dot"></span>Online</div>
</div>

<div class="main">

  <div class="card">

    <div class="header">AI Chat Dashboard</div>

    <div class="chat" id="chat"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Напиши сообщение...">
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}
</script>

</body>
</html>
