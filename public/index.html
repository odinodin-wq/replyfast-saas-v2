<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SaaS Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
}

#auth {
  max-width:400px;
  margin:60px auto;
  padding:20px;
  background:#111;
  border-radius:12px;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
}

input {
  background:#222;
  color:white;
}

button {
  background:#ff2d2d;
  color:white;
  cursor:pointer;
}

#app {
  display:none;
  padding:15px;
}

.top {
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:10px;
  border-radius:10px;
}

.online {
  color:#00ff88;
}

.chat {
  margin-top:15px;
  background:#111;
  height:350px;
  overflow:auto;
  padding:10px;
  border-radius:10px;
}

.msg {
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}

.user {background:#ff2d2d;}
.ai {background:#222;}

.inputBox {
  display:flex;
  margin-top:10px;
}

.inputBox input {
  flex:1;
}

.inputBox button {
  width:120px;
  margin-left:10px;
}

.tariffs {
  margin-top:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>AI SaaS Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="app">

  <div class="top">
    <div>🔥 AI Sales Bot</div>
    <div class="online">● online</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Напиши клиентский запрос...">
    <button onclick="send()">Send</button>
  </div>

  <div class="tariffs">
    <h3>Тарифы</h3>

    <p>Free — 10 сообщений</p>
    <button>Начать</button>

    <p style="margin-top:10px;">PRO — без лимита</p>
    <button>Купить</button>
  </div>

</div>

<script>

// 🔑 SUPABASE
const SUPABASE_URL = "https://cowsflyfghivkafjauzm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvd3NmbHlmZ2hpdmthZmphdXptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzY1NjAsImV4cCI6MjA5MjUxMjU2MH0.Z3YWipoU_0ZX2XNWTvp-v0TdMgQ0s6V_r90SHD7Ukx8";

const supabase = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let user = null;

// 🔐 SIGN UP
async function signUp(){
  let { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  status.innerText = error ? error.message : "Check email 📩";
}

// 🔐 LOGIN
async function signIn(){
  let { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    status.innerText = error.message;
  } else {
    user = data.user;
    start();
  }
}

function start(){
  auth.style.display = "none";
  app.style.display = "block";
}

// 💬 CHAT UI
function add(text, cls){
  chat.innerHTML += `<div class="msg ${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// 🤖 AI LOGIC
async function send(){
  let text = msg.value;
  if(!text) return;

  add("Ты: " + text, "user");

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:text,
      userId:user.id
    })
  });

  let data = await res.json();

  add("AI: " + data.reply, "ai");

  msg.value = "";
}

// 🚪 LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

</script>

</body>
</html>
