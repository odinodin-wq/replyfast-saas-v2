<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ReplyFast SaaS</title>

<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background: radial-gradient(circle at top, #1a0000, #000);
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* sidebar */
.sidebar {
  width:240px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

.logo {
  font-size:20px;
  font-weight:bold;
  color:#ff3b3b;
}

.online {
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

.dot {
  width:8px;
  height:8px;
  background:lime;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
  box-shadow:0 0 10px lime;
}

/* main */
.main {
  flex:1;
  padding:30px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
  backdrop-filter: blur(20px);
}

.chat {
  margin-top:20px;
  height:360px;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#ff2d2d;
  align-self:flex-end;
}

.ai {
  background:#222;
}

.inputBox {
  display:flex;
  margin-top:15px;
}

input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

button {
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff2d2d,#ff6b6b);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
}

.typing {
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">ReplyFast AI</div>
  <div class="online"><span class="dot"></span>Online</div>
  <p style="margin-top:20px;color:#aaa;">Dashboard</p>
  <p style="color:#aaa;">Messages</p>
</div>

<div class="main">

  <div class="card">
    <h2>AI Assistant</h2>
    <div class="typing" id="typing"></div>

    <div class="chat" id="chat"></div>

    <div class="inputBox">
      <input id="msg" placeholder="Напиши сообщение...">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
function addMsg(text, type){
  chat.innerHTML += `<div class="msg ${type}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let text = msg.value;
  addMsg("Ты: " + text, "user");

  typing.innerText = "AI is typing...";

  let res = await fetch("/ai", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let data = await res.json();

  setTimeout(()=>{
    addMsg("AI: " + data.reply, "ai");
    typing.innerText = "";
  }, 600);
}
</script>

</body>
</html>
